model:
  n_layers: 1
  d_token: 1024
  token_bias: true
  d_ffn_factor: 0.66
  ffn_dropout: null
  residual_dropout: 0.1
  num_prototypes: 4
  routing_tau: 1.0
  residual_dropout_head: 0.1
  pure_experts: false

training:
  lr: 1.0e-4
  weight_decay: 0.0
  optimizer: "adamw"
  huber_delta: 1.0
  lambda_sparse: 1.0e-3
  lambda_balance: 1.0e-2
  lambda_sep: 1.0e-4
