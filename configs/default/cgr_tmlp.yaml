model:
  model_name: cgr_tmlp
  base_model: agr_tmlp_softgate
  n_layers: 1
  d_token: 1024
  token_bias: true
  d_ffn_factor: 0.66
  ffn_dropout: null
  residual_dropout: 0.1
  residual_dropout_head: 0.0
  gate_reg_weight_scale: 0.05
  use_corr_reg: false
  use_featmix: false
  use_hidmix: false
  safe_hidden_ratio: 0.5
  topk_ratio: 0.15
  topk_min: 4
  topk_max: 8
  top_summary_dim: 16
  spec_hidden_ratio: 0.25
  conf_hidden_ratio: 0.25
  gamma_init_bias: -2.6
  spec_output_scale: 0.10

training:
  lr: 1.0e-4
  base_lr: 1.0e-4
  spec_lr: 5.0e-5
  weight_decay: 0.0
  optimizer: "adamw"
  max_epochs: 200
  train_mode: "two_stage"
  stage1_ratio: 0.4
  early_stop_patience: 8
  main_loss_type: "huber"
  huber_delta: 1.0
  lambda_gate: 1.0e-3
  lambda_corr: 0.0
  featmix_alpha: 0.4
