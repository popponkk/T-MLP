model:
  model_name: ggpl_tmlp_swap_graph_slimtok
  base_model: ggpl_tmlp
  n_layers: 1
  d_token: 1024
  token_bias: true
  d_ffn_factor: 0.66
  ffn_dropout: null
  residual_dropout: 0.1
  num_breakpoints: 8
  breakpoint_init: "gbdt"
  breakpoint_fallback: "quantile"
  breakpoint_cache_dir: "artifacts/ggpl_tmlp_swap_graph_slimtok_breakpoints"
  learnable_breakpoints: true
  slimtok_rank_ratio: 0.5
  slimtok_min_rank: 16
  slimtok_rank: null
  slimtok_dropout: null
  slimtok_layerscale_init: 1.0e-2
  slimtok_activation: "gelu"
  graph_dynamic_rank: 16
  graph_temperature: 1.0
  graph_dynamic_scale_init: 1.0e-2
  graph_self_loop_init: 2.0

training:
  lr: 1.0e-4
  weight_decay: 0.0
  optimizer: "adamw"
