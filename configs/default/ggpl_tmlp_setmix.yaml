model:
  model_name: ggpl_tmlp_setmix
  base_model: ggpl_tmlp
  n_layers: 1
  d_token: 1024
  token_bias: true
  d_ffn_factor: 0.66
  ffn_dropout: null
  residual_dropout: 0.1
  num_breakpoints: 8
  breakpoint_init: "gbdt"
  breakpoint_fallback: "quantile"
  breakpoint_cache_dir: "artifacts/ggpl_tmlp_setmix_breakpoints"
  learnable_breakpoints: true
  setmix_hidden_ratio: 2.0
  setmix_hidden_dim: null
  setmix_channel_ratio: 2.0
  setmix_dropout: null
  setmix_activation: "gelu"
  setmix_layerscale_init: 0.01
  setmix_pool: "mean"

training:
  lr: 1.0e-4
  weight_decay: 0.0
  optimizer: "adamw"
