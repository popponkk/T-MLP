model:
  model_name: ggpl_tmlp_crossmix
  base_model: ggpl_tmlp
  n_layers: 1
  d_token: 1024
  token_bias: true
  d_ffn_factor: 0.66
  ffn_dropout: null
  residual_dropout: 0.1
  num_breakpoints: 8
  breakpoint_init: "gbdt"
  breakpoint_fallback: "quantile"
  breakpoint_cache_dir: "artifacts/ggpl_tmlp_crossmix_breakpoints"
  learnable_breakpoints: true
  crossmix_hidden_ratio: 1.0
  crossmix_hidden_dim: null
  crossmix_channel_ratio: 2.0
  crossmix_dropout: null
  crossmix_activation: "gelu"
  crossmix_layerscale_init: 0.01
  crossmix_use_channel_mlp: true

training:
  lr: 1.0e-4
  weight_decay: 0.0
  optimizer: "adamw"
