model:
  n_layers: 1
  d_token: 1024
  token_bias: true
  d_ffn_factor: 0.66
  ffn_dropout: null
  residual_dropout: 0.1
  residual_dropout_head: 0.1
  use_error_head: true
  gate_from_h_only: true

training:
  lr: 1.0e-4
  weight_decay: 0.0
  optimizer: "adamw"
  huber_delta: 1.0
  lambda_err: 0.1
  lambda_gate: 1.0e-3
  lambda_res: 1.0e-4
  freeze_backbone_epochs: 0
  finetune_last_block: false
