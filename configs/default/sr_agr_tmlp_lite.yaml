model:
  model_name: sr_agr_tmlp_lite
  n_layers: 1
  d_token: 1024
  token_bias: true
  d_ffn_factor: 0.66
  ffn_dropout: null
  residual_dropout: 0.1
  beta_init_bias: -2.0
  use_gate_reg: false
  use_corr_reg: false
  use_featmix: false
  use_hidmix: false
  use_sparse_reg: false
  use_balance_reg: false

training:
  lr: 1.0e-4
  weight_decay: 0.0
  optimizer: "adamw"
  huber_delta: 1.0
  lambda_gate: 0.0
  lambda_corr: 0.0
  featmix_alpha: 0.4
