model:
  model_name: nr_cgr_tmlp
  base_model: cgr_tmlp
  n_layers: 1
  d_token: 1024
  token_bias: true
  d_ffn_factor: 0.66
  ffn_dropout: null
  residual_dropout: 0.1
  residual_dropout_head: 0.0
  gate_reg_weight_scale: 0.05
  use_corr_reg: false
  use_featmix: false
  use_hidmix: false
  target_transform: "none"
  feature_norm: "robust"
  safe_hidden_ratio: 0.5
  topk_ratio: 0.15
  topk_min: 4
  topk_max: 8
  top_summary_dim: 16
  spec_hidden_ratio: 0.25
  spec_output_scale: 1.0
  scale_hidden_ratio: 0.25
  scale_eps: 1.0e-4
  conf_hidden_ratio: 0.25
  gamma_init_bias: -2.6

training:
  lr: 1.0e-4
  weight_decay: 0.0
  optimizer: "adamw"
  main_loss_type: "huber"
  huber_delta: 1.0
  lambda_gate: 1.0e-3
  lambda_corr: 0.0
  featmix_alpha: 0.4
