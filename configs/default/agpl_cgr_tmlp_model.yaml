model:
  model_name: agpl_cgr_tmlp
  base_model: cgr_tmlp
  n_layers: 1
  d_token: 1024
  token_bias: true
  d_ffn_factor: 0.66
  ffn_dropout: null
  residual_dropout: 0.1
  residual_dropout_head: 0.0
  gate_reg_weight_scale: 0.05
  use_corr_reg: false
  use_featmix: false
  use_hidmix: false

  use_raw_view: true
  use_qcal_view: true
  use_ggpl_view: true
  use_robust_view: true
  robust_eps: 1.0e-6
  use_quantile_view: true
  quantile_view_type: "rank_percentile"

  num_breakpoints: 8
  emb_dim_per_feature: 4
  breakpoint_init: "gbdt"
  breakpoint_fallback: "quantile"
  breakpoint_cache_dir: "artifacts/agpl_breakpoints"
  learnable_breakpoints: true

  qcal_hidden_dim: 16
  qcal_num_layers: 2
  qcal_residual_scale: 0.1

  ggpl_residual_scale: 0.1

  featurewise_fusion_gate: true
  fusion_hidden_dim: 16
  fusion_num_layers: 2
  raw_init_weight: 0.8
  qcal_init_weight: 0.1
  ggpl_init_weight: 0.1

  safe_hidden_ratio: 0.5
  topk_ratio: 0.15
  topk_min: 4
  topk_max: 8
  top_summary_dim: 16
  spec_hidden_ratio: 0.25
  conf_hidden_ratio: 0.25
  gamma_init_bias: -2.0

training:
  lr: 1.0e-4
  weight_decay: 0.0
  optimizer: "adamw"
  main_loss_type: "huber"
  huber_delta: 1.0
  lambda_gate: 1.0e-3
  lambda_corr: 0.0
  featmix_alpha: 0.4
