model:
  model_name: apar_cgr_tmlp
  base_model: cgr_tmlp
  n_layers: 1
  d_token: 1024
  token_bias: true
  d_ffn_factor: 0.66
  ffn_dropout: null
  residual_dropout: 0.1
  residual_dropout_head: 0.0
  gate_reg_weight_scale: 0.05
  use_corr_reg: false
  use_featmix: false
  use_hidmix: false

  safe_hidden_ratio: 0.5
  topk_ratio: 0.15
  topk_min: 4
  topk_max: 8
  top_summary_dim: 16
  spec_hidden_ratio: 0.25
  conf_hidden_ratio: 0.25
  gamma_init_bias: -2.0

  rank_hidden_dim: 64

training:
  lr: 1.0e-4
  weight_decay: 0.0
  optimizer: "adamw"
  main_loss_type: "huber"
  huber_delta: 1.0
  lambda_gate: 1.0e-3
  lambda_corr: 0.0
  featmix_alpha: 0.4

  use_rank_aux: true
  rank_aux_type: "pairwise_order"
  lambda_rank: 0.05
  pairs_per_batch: "batch_size"
  warmup_aux_epochs: 0
