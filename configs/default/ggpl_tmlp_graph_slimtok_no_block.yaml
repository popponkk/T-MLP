model:
  model_name: ggpl_tmlp_graph_slimtok_no_block
  base_model: ggpl_tmlp
  d_token: 1024
  token_bias: true
  num_breakpoints: 8
  breakpoint_init: "gbdt"
  breakpoint_fallback: "quantile"
  breakpoint_cache_dir: "artifacts/ggpl_tmlp_graph_slimtok_no_block_breakpoints"
  learnable_breakpoints: true
  slimtok_activation: "gelu"

training:
  lr: 1.0e-4
  weight_decay: 0.0
  optimizer: "adamw"
