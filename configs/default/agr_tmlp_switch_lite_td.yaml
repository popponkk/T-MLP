model:
  model_name: agr_tmlp_switch_lite_td
  base_model: agr_tmlp_switch_lite
  n_layers: 1
  d_token: 1024
  token_bias: true
  d_ffn_factor: 0.66
  ffn_dropout: null
  residual_dropout: 0.1
  residual_dropout_head: 0.0
  gate_reg_weight_scale: 0.05
  use_corr_reg: false
  use_featmix: false
  use_hidmix: false
  safe_hidden_ratio: 0.5
  num_residual_experts: 2
  expert_hidden_ratio: 0.25
  router_temperature: 1.5
  expert_output_scale_init: 0.15
  topk_ratio: 0.15
  topk_min: 4
  topk_max: 8
  cross_rank: 8
  cross_output_scale_init: 0.1
  beta_init_bias: -2.0
  mode_gate_bias_off: 1.5
  mode_gate_bias_safe: 1.0
  mode_gate_bias_expert: -0.5
  mode_gate_bias_cross: -0.5
  use_router: true
  mode_temperature: 1.0
  use_tree_distill: true
  teacher_type: catboost
  distill_weight_max: 0.2
  teacher_cache_dir: artifacts/teacher_preds
  split_id: default
  use_branch_dropout: true
  safe_drop_prob: 0.10
  expert_drop_prob: 0.20
  cross_drop_prob: 0.20
  use_mode_temp_anneal: true
  mode_temp_start: 1.0
  mode_temp_end: 0.7

training:
  lr: 1.0e-4
  weight_decay: 0.0
  optimizer: "adamw"
  huber_delta: 1.0
  lambda_gate: 1.0e-3
  lambda_corr: 0.0
  featmix_alpha: 0.4
