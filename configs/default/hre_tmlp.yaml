model:
  n_layers: 1
  d_token: 1024
  token_bias: true
  d_ffn_factor: 0.66
  ffn_dropout: null
  residual_dropout: 0.1
  num_experts: 4
  top_k: 2
  residual_dropout_head: 0.1
  dense_routing: false
  disable_alpha: false
  disable_global_residual: false

training:
  lr: 1.0e-4
  weight_decay: 0.0
  optimizer: "adamw"
  huber_delta: 1.0
  lambda_sparse: 1.0e-3
  lambda_balance: 1.0e-2
  lambda_div: 1.0e-3
  lambda_alpha: 1.0e-3
  freeze_backbone_epochs: 0
  finetune_last_block: false
